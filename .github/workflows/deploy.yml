name: CI/CD Pipeline (Final)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # -----------------------------
      # 🟦 CHECKOUT CODE
      # -----------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------
      # 🟦 SETUP NODE
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # -----------------------------
      # 🟦 BACKEND CI
      # -----------------------------
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Run ESLint (Backend)
        working-directory: ./backend
        run: |
          npx eslint . || echo "ESLint issues found"

      - name: Security Scan (Backend)
        working-directory: ./backend
        run: |
          npm audit --audit-level=moderate || echo "Vulnerabilities found"

      # -----------------------------
      # 🟦 FRONTEND CI
      # -----------------------------
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run ESLint (Frontend)
        working-directory: ./frontend
        run: |
          npx eslint . || echo "ESLint issues found"

      - name: Security Scan (Frontend)
        working-directory: ./frontend
        run: |
          npm audit --audit-level=moderate || echo "Vulnerabilities found"

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      # -----------------------------
      # 🟩 DEPLOY TO EC2
      # -----------------------------
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          script: |

            echo "🚀 Starting Deployment..."

            # 🔥 IMPORTANT: Correct folder name
            cd ~/Task-Tracker

            echo "📥 Pull latest code"
            git pull origin main

            # -----------------------------
            # 🟦 BACKEND DEPLOY
            # -----------------------------
            echo "📦 Installing backend dependencies"
            cd backend
            npm install

            echo "🔄 Restart backend"
            pm2 restart task-backend || pm2 start server.js --name task-backend

            # -----------------------------
            # 🟦 FRONTEND DEPLOY
            # -----------------------------
            echo "🌐 Moving to frontend"
            cd ~/Task-Tracker/frontend

            echo "📦 Installing frontend dependencies"
            npm install

            echo "🏗️ Building frontend"
            npm run build

            echo "🔍 Checking build output"
            ls build

            # -----------------------------
            # 🟦 DEPLOY BUILD
            # -----------------------------
            echo "🧹 Cleaning old frontend"
            sudo rm -rf /var/www/html/*

            echo "📂 Copying new build"
            sudo cp -r build/* /var/www/html/

            echo "🔐 Fix permissions"
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html

            # -----------------------------
            # 🟦 RESTART NGINX
            # -----------------------------
            echo "🔁 Restarting Nginx"
            sudo systemctl restart nginx

            echo "✅ Deployment Complete!"